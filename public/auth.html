<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Epic Gift Hub — License</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d0e10;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(6,112,240,.13) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,63,199,.1) 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,rgba(10,138,63,.08) 0%,transparent 50%),#0d0e10}
.particles{position:absolute;inset:0}
.p{position:absolute;border-radius:50%;animation:drift linear infinite;opacity:0}
@keyframes drift{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}

.card{position:relative;z-index:1;width:460px;max-width:94vw;background:linear-gradient(160deg,#1a1d24,#141720);border:1px solid rgba(6,112,240,.2);border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);animation:cardIn .55s cubic-bezier(.175,.885,.32,1.1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.95)}to{opacity:1;transform:none}}
.accent-bar{height:3px;background:linear-gradient(to right,#0670f0,#8b3fc7,#0fc864,#0670f0);background-size:300% 100%;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:300% 0}100%{background-position:-300% 0}}

.card-header{padding:30px 36px 22px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.logo-box{width:40px;height:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center}
.brand{font-size:17px;font-weight:800;letter-spacing:.3px}
.card-title{font-size:23px;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,#fff,#c0d4f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-sub{font-size:13px;color:#7a8494;line-height:1.55}

.card-body{padding:26px 36px 30px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7a8494;margin-bottom:7px;display:block}
.form-input{width:100%;background:#0d0e10;border:1.5px solid #22262e;color:#fff;font-size:14px;padding:13px 16px;border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px}
.form-input:focus{border-color:#0670f0;box-shadow:0 0 0 3px rgba(6,112,240,.14)}
.form-input::placeholder{color:#353a45}
.form-input.key-font{font-family:monospace;letter-spacing:1.5px}
.form-input.error{border-color:#e0395a;box-shadow:0 0 0 3px rgba(224,57,90,.12)}
.form-input.ok{border-color:#0a8a3f;box-shadow:0 0 0 3px rgba(10,138,63,.14)}

.status-msg{border-radius:8px;padding:11px 14px;font-size:13px;font-weight:600;display:none;align-items:center;gap:10px;margin-bottom:16px}
.status-msg.show{display:flex;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.status-msg.err{background:rgba(224,57,90,.1);border:1px solid rgba(224,57,90,.28);color:#f87171}
.status-msg.good{background:rgba(10,138,63,.1);border:1px solid rgba(10,138,63,.28);color:#4ade80}
.status-msg.info{background:rgba(6,112,240,.08);border:1px solid rgba(6,112,240,.2);color:#93c5fd}

.submit-btn{width:100%;background:linear-gradient(135deg,#0670f0,#0455cc);color:#fff;border:none;padding:15px;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:20px;letter-spacing:.3px}
.submit-btn:hover:not(:disabled){background:linear-gradient(135deg,#1c7eff,#0670f0);transform:translateY(-1px);box-shadow:0 10px 28px rgba(6,112,240,.38)}
.submit-btn:active:not(:disabled){transform:scale(.98)}
.submit-btn:disabled{opacity:.45;cursor:default}
.submit-btn .btn-label{transition:opacity .2s}
.submit-btn.loading .btn-label{opacity:0}
.btn-spin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.submit-btn.loading .btn-spin{display:block}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

.divider{display:flex;align-items:center;gap:12px;font-size:11px;color:#2e333d;margin-bottom:18px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1c2030}

.footer-links{display:flex;justify-content:center;gap:24px}
.footer-links a{font-size:12px;color:#4a5568;text-decoration:none;transition:color .15s;display:flex;align-items:center;gap:5px}
.footer-links a:hover{color:#fff}

/* Discord link highlight */
.discord-link{color:#5865f2 !important;font-weight:700}
.discord-link:hover{color:#7c86ff !important}

/* success screen */
.success-screen{display:none;text-align:center;padding:44px 36px}
.succ-icon{width:76px;height:76px;border-radius:50%;background:rgba(10,138,63,.14);border:2px solid #0a8a3f;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:34px;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.succ-title{font-size:22px;font-weight:900;color:#4ade80;margin-bottom:6px}
.succ-sub{font-size:13px;color:#7a8494;margin-bottom:28px;line-height:1.55}
.enter-btn{display:inline-block;background:linear-gradient(135deg,#0670f0,#0455cc);color:#fff;border:none;padding:13px 36px;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.enter-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(6,112,240,.38)}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grad"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="card">
  <div class="accent-bar"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="card-header">
      <div class="logo-row">
        <div class="logo-box">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M2 2h20v20H2V2z" fill="#111"/><path d="M6 6h5v2H8v3h2.5v2H8v3h3v2H6V6zm7 0h5v2h-3v8h-2V6z" fill="#fff"/></svg>
        </div>
        <span class="brand">Epic Gift Hub</span>
      </div>
      <div class="card-title">Activate License</div>
      <div class="card-sub">Enter your license key and Discord username<br>to access the platform.</div>
    </div>

    <div class="card-body">

      <label class="form-label" for="discordInput">Discord Username</label>
      <input class="form-input" id="discordInput" type="text" placeholder="e.g. cooluser or cooluser#1234" autocomplete="off">

      <label class="form-label" for="keyInput">License Key</label>
      <input class="form-input key-font" id="keyInput" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">

      <div class="status-msg" id="statusMsg">
        <span id="statusIcon"></span>
        <span id="statusText"></span>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitKey()">
        <span class="btn-label">Activate Key</span>
        <div class="btn-spin"></div>
      </button>

      <div class="divider">need a key?</div>

      <div class="footer-links">
        <a href="https://discord.gg/jJGsD8rpxN" target="_blank" class="discord-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Buy a Key on Discord
        </a>
        <a href="https://keyauth.cc" target="_blank">🔑 KeyAuth</a>
      </div>
    </div>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successScreen">
    <div class="succ-icon">🎁</div>
    <div class="succ-title">Access Granted!</div>
    <div class="succ-sub" id="succSub">Welcome! Your key has been activated.</div>
    <button class="enter-btn" onclick="enterApp()">Enter Epic Gift Hub →</button>
  </div>
</div>

<script>
function showStatus(type, icon, text){
  const el=document.getElementById('statusMsg');
  el.className='status-msg show '+type;
  document.getElementById('statusIcon').textContent=icon;
  document.getElementById('statusText').textContent=text;
}
function hideStatus(){ document.getElementById('statusMsg').className='status-msg'; }

document.getElementById('keyInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitKey(); });
document.getElementById('discordInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitKey(); });

async function submitKey(){
  const key = document.getElementById('keyInput').value.trim();
  const discord = document.getElementById('discordInput').value.trim();

  if(!discord){ showStatus('err','⚠️','Please enter your Discord username.'); document.getElementById('discordInput').focus(); return; }
  if(!key){ showStatus('err','⚠️','Please enter your license key.'); document.getElementById('keyInput').focus(); return; }

  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.classList.add('loading');
  hideStatus();
  showStatus('info','⏳','Validating key...');

  try {
    const res = await fetch('/api/verify-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, discord })
    });
    const data = await res.json();

    btn.disabled=false; btn.classList.remove('loading');

    if(data.success){
      document.getElementById('keyInput').classList.add('ok');
      showStatus('good','✓','Key valid! Logging you in...');
      sessionStorage.setItem('egh_auth', JSON.stringify({ key, discord, ts: Date.now() }));
      setTimeout(showSuccess, 900);
    } else {
      document.getElementById('keyInput').classList.add('error');
      const msg = (data.message||'Invalid key.').replace(/<[^>]+>/g,'');
      showStatus('err','❌', msg);
      document.getElementById('keyInput').style.animation='shake .4s ease';
      setTimeout(()=>document.getElementById('keyInput').style.animation='',400);
    }
  } catch(e){
    btn.disabled=false; btn.classList.remove('loading');
    showStatus('err','❌','Network error. Try again.');
  }
}

function showSuccess(){
  document.getElementById('loginForm').style.display='none';
  const ss=document.getElementById('successScreen');
  ss.style.display='block';
  const discord=document.getElementById('discordInput').value.trim();
  document.getElementById('succSub').textContent=`Welcome, ${discord}! Your key is active.`;
}

function enterApp(){ window.location.href='/'; }

// Check existing session
const existing=sessionStorage.getItem('egh_auth');
if(existing){
  try {
    const a=JSON.parse(existing);
    if(a.key && a.discord){ showSuccess(); }
  } catch(e){ sessionStorage.removeItem('egh_auth'); }
}

// Shake keyframe
const s=document.createElement('style');
s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}';
document.head.appendChild(s);

// Particles
const pw=document.getElementById('particles');
const cols=['#0670f0','#8b3fc7','#0fc864','#ffffff18','#e08a1d'];
for(let i=0;i<30;i++){
  const p=document.createElement('div');
  p.className='p';
  const sz=1.5+Math.random()*3.5;
  p.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*100}%;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s`;
  pw.appendChild(p);
}
</script>
</body>
</html>
